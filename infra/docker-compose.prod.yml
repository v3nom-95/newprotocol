version: "3.9"
services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qai}
      POSTGRES_DB: ${POSTGRES_DB:-qai_chain}
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: always
    env_file:
      - ../backend/.env
    depends_on:
      - postgres
      - redis
    expose:
      - "8000"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: always
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pg_data:
