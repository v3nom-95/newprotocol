version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: qai
      POSTGRES_PASSWORD: qai
      POSTGRES_DB: qai_chain
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    image: python:3.13-slim
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - ../backend/.env
    volumes:
      - ../:/app
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  frontend:
    image: node:20
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ../:/app
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pg_data:
